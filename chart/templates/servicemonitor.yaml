{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "reference-app.name" . }}
  labels: {{- include "reference-app.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "reference-app.name" . }}
  endpoints:
    - { port: http, path: /metrics, interval: 30s }
{{- end }}
