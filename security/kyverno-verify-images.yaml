# Blocks images that aren't keyless-signed by THIS GitLab project's pipeline.
# imageReferences is scoped to your registry, so system/3rd-party images are
# unaffected. Replace YOUR_GROUP with your GitLab group/namespace.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify Image Signatures
    policies.kyverno.io/category: Supply Chain Security
spec:
  validationFailureAction: Enforce
  webhookTimeoutSeconds: 30      # image verification needs headroom
  background: false              # image verification cannot run in background
  failurePolicy: Fail
  rules:
    - name: verify-gitlab-keyless
      match:
        any:
          - resources: { kinds: [Pod] }
      exclude:
        any:
          - resources: { namespaces: [kube-system, kyverno, gmp-system, gke-managed-system, external-secrets] }
      verifyImages:
        - imageReferences:
            - "registry.gitlab.com/YOUR_GROUP/gke-reference-platform*"
          attestors:
            - entries:
                - keyless:
                    subjectRegExp: "https://gitlab\\.com/YOUR_GROUP/gke-reference-platform.*"
                    issuerRegExp: "https://gitlab\\.com"
                    rekor:
                      url: https://rekor.sigstore.dev
