# Pulls secrets from GCP Secret Manager into Kubernetes via External Secrets
# Operator, authenticated through Workload Identity (no static keys).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata: { name: gcp-secret-store, namespace: production }
spec:
  provider:
    gcpsm:
      projectID: YOUR_PROJECT
      auth: { workloadIdentity: { clusterLocation: us-central1, clusterName: reference-platform } }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata: { name: app-secrets, namespace: production }
spec:
  refreshInterval: 1h
  secretStoreRef: { name: gcp-secret-store, kind: SecretStore }
  target: { name: app-secrets }
  data:
    - secretKey: api-key
      remoteRef: { key: reference-app-api-key }
