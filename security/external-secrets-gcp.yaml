# Pulls secrets from GCP Secret Manager into Kubernetes via External Secrets
# Operator, authenticated by Workload Identity (no static keys). API: v1 (GA).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-store
  namespace: production
spec:
  provider:
    gcpsm:
      projectID: project-90390b2c-d762-4668-939
      auth:
        workloadIdentity:
          clusterLocation: us-central1          # cluster region (Autopilot = regional)
          clusterName: reference-platform
          serviceAccountRef:
            name: reference-app                  # KSA annotated with the app's Google SA (Phase 2)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: app-secrets            # the K8s Secret the app mounts via envFrom
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        key: reference-app-api-key   # secret name in GCP Secret Manager
