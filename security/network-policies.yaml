# Default-deny ingress, then explicitly allow what the app needs.
# GKE Autopilot enforces NetworkPolicy by default (Dataplane V2).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny-ingress, namespace: production }
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-app-ingress, namespace: production }
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: reference-app }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}            # same namespace; add ingress-controller ns as needed
      ports:
        - { protocol: TCP, port: 8080 }
