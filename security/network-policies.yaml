# Default-deny ingress in production, then allow only what's needed.
# GKE Autopilot enforces NetworkPolicy by default (Dataplane V2).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: production
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
# Allow Managed Service for Prometheus to scrape /metrics.
# GMP's collector runs in gke-gmp-system / gmp-system; allow both by namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gmp-scrape
  namespace: production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: reference-app
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gke-gmp-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gmp-system
      ports:
        - protocol: TCP
          port: 8080
---
# Allow same-namespace traffic (e.g., your own port-forward target / intra-ns calls).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: reference-app
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
