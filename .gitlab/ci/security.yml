# Security stage. SBOM + image vuln scan, authenticated to Artifact Registry
# via the same keyless WIF used by build/deploy.

# Hidden template: WIF auth to GCP + configure docker for Artifact Registry.
.gcp-auth:
  image: google/cloud-sdk:slim
  id_tokens:
    GCP_ID_TOKEN:
      aud: //iam.googleapis.com/projects/100137106185/locations/global/workloadIdentityPools/github-pool/providers/gitlab-provider
  before_script:
    - echo "$GCP_ID_TOKEN" > /tmp/gitlab_oidc_token
    - |
      gcloud iam workload-identity-pools create-cred-config \
        "$GCP_WIF_PROVIDER" \
        --service-account="$GCP_SERVICE_ACCOUNT" \
        --output-file=/tmp/wif-cred.json \
        --credential-source-file=/tmp/gitlab_oidc_token
    - gcloud auth login --cred-file=/tmp/wif-cred.json
    - gcloud config set project "$GCP_PROJECT_ID"
    - gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

sbom:
  stage: sbom
  extends: .gcp-auth
  script:
    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - syft "$IMAGE:$TAG" -o spdx-json=sbom.spdx.json
  artifacts:
    paths: [ sbom.spdx.json ]
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

trivy-image:
  stage: security
  extends: .gcp-auth
  script:
    - curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format table "$IMAGE:$TAG"
    - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed "$IMAGE:$TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

semgrep-sast:
  stage: security
  image: semgrep/semgrep:latest
  script: [ "semgrep scan --config auto app/ || true" ]
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --no-banner --redact --exit-code 0
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
