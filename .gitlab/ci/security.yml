# Security stage. For the first GKE deploy run these are non-blocking
# (allow_failure: true) so the build->deploy path proves itself; they get
# AR auth + gating hardened once the core pipeline is green.

sbom:
  stage: sbom
  image: anchore/syft:latest
  script:
    - syft "$IMAGE:$TAG" -o spdx-json=sbom.spdx.json || true
  artifacts:
    paths: [ sbom.spdx.json ]
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

trivy-image:
  stage: security
  image: aquasec/trivy:latest
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format table "$IMAGE:$TAG" || true
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

semgrep-sast:
  stage: security
  image: semgrep/semgrep:latest
  script: [ "semgrep scan --config auto app/ || true" ]
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

gitleaks:
  stage: security
  image: zricethezav/gitleaks:latest
  script: [ "gitleaks detect --source . --no-banner --redact || true" ]
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
