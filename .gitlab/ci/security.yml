# These jobs run regardless of GitLab tier, and demonstrate knowledge of the
# tools behind GitLab's templates: Trivy, Semgrep, Gitleaks, Syft, Cosign.

sbom:
  stage: sbom
  image: anchore/syft:latest
  script:
    - syft "$IMAGE:$TAG" -o spdx-json=sbom.spdx.json -o cyclonedx-json=sbom.cdx.json
  artifacts:
    paths: [ sbom.spdx.json, sbom.cdx.json ]
    expire_in: 30 days

trivy-image:
  stage: security
  image: aquasec/trivy:latest
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format table "$IMAGE:$TAG"
    - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed "$IMAGE:$TAG"  # gate on fixable CRITICALs
  allow_failure: false

semgrep-sast:
  stage: security
  image: semgrep/semgrep:latest
  script: [ "semgrep scan --config auto --error app/" ]
  allow_failure: true

gitleaks:
  stage: security
  image: zricethezav/gitleaks:latest
  script: [ "gitleaks detect --source . --no-banner --redact" ]

cosign-sign:
  stage: security
  image: gcr.io/projectsigstore/cosign:latest
  # Keyless signing via the pipeline's OIDC token (Sigstore/Fulcio).
  variables: { COSIGN_YES: "true" }
  id_tokens:
    SIGSTORE_ID_TOKEN: { aud: sigstore }
  script:
    - cosign sign "$IMAGE:$TAG"
    - cosign attest --predicate sbom.cdx.json --type cyclonedx "$IMAGE:$TAG"
  rules: [{ if: '$CI_COMMIT_BRANCH == "main"' }]
