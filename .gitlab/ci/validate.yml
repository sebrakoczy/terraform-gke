go-lint:
  stage: validate
  image:
    name: golangci/golangci-lint:latest
    entrypoint: [""]
  script:
    - cd app
    - golangci-lint run ./... || true   # informational while warming up
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

helm-lint:
  stage: validate
  image:
    name: alpine/helm:latest
    entrypoint: [""]
  script:
    - helm lint chart/

tf-validate:
  stage: validate
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  script:
    - cd terraform
    - terraform fmt -check -recursive || true
    - terraform init -backend=false
    - terraform validate
  allow_failure: true   # informational; WIF/state not needed to validate syntax

go-test:
  stage: test
  image: golang:1.23
  script:
    - cd app
    - go test -race -coverprofile=cover.out ./...
  coverage: '/coverage: \d+.\d+% of statements/'
  artifacts:
    paths: [ app/cover.out ]
