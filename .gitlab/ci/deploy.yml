# Deploy to GKE using keyless Workload Identity Federation (no stored keys).
.deploy:
  image: google/cloud-sdk:slim
  id_tokens:
    GCP_ID_TOKEN:
      aud: //iam.googleapis.com/projects/100137106185/locations/global/workloadIdentityPools/github-pool/providers/gitlab-provider
  before_script:
    - apt-get update -qq && apt-get install -qq -y google-cloud-cli-gke-gcloud-auth-plugin kubectl >/dev/null 2>&1
    - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash >/dev/null
    - export USE_GKE_GCLOUD_AUTH_PLUGIN=True
    - echo "$GCP_ID_TOKEN" > /tmp/gitlab_oidc_token
    - |
      gcloud iam workload-identity-pools create-cred-config \
        "$GCP_WIF_PROVIDER" \
        --service-account="$GCP_SERVICE_ACCOUNT" \
        --output-file=/tmp/wif-cred.json \
        --credential-source-file=/tmp/gitlab_oidc_token
    - gcloud auth login --cred-file=/tmp/wif-cred.json
    - gcloud config set project "$GCP_PROJECT_ID"
    - gcloud container clusters get-credentials reference-platform --region us-central1
  script:
    # bootstrap namespace, WI-annotated service account, and secret (idempotent)
    - kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
    - kubectl create serviceaccount reference-app -n "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
    - |
      kubectl annotate sa reference-app -n "$NAMESPACE" \
        iam.gke.io/gcp-service-account=reference-platform-app@${GCP_PROJECT_ID}.iam.gserviceaccount.com --overwrite
    - |
      kubectl create secret generic app-secrets -n "$NAMESPACE" \
        --from-literal=API_KEY=placeholder --dry-run=client -o yaml | kubectl apply -f -
    - |
      helm upgrade --install reference-app chart/ \
        --namespace "$NAMESPACE" --create-namespace \
        --set image.repository="$IMAGE" \
        --set image.tag="$TAG" \
        --set serviceMonitor.enabled=false \
        --set replicaCount=1
    - kubectl rollout status deploy/reference-app -n "$NAMESPACE" --timeout=420s

deploy-staging:
  stage: deploy-staging
  extends: .deploy
  variables:
    NAMESPACE: staging
  environment:
    name: staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy-prod:
  stage: deploy-prod
  extends: .deploy
  variables:
    NAMESPACE: production
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
