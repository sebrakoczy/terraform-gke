name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write        # required for GitHub OIDC: WIF auth AND keyless cosign

env:
  PROJECT_ID: project-90390b2c-d762-4668-939
  REGION: us-central1
  CLUSTER: reference-platform
  AR_REPO: reference
  IMAGE_NAME: reference-app

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Unit tests
        working-directory: app
        run: |
          go mod tidy
          go test -race ./...
      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: SAST (Semgrep)
        run: |
          pip install semgrep
          semgrep scan --config auto app/ || true   # informational for now

  build:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: sigstore/cosign-installer@v3
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet
      - name: Build and push
        id: push
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}"
          docker build -t "$IMG:${GITHUB_SHA}" -t "$IMG:latest" app/
          docker push "$IMG:${GITHUB_SHA}"
          docker push "$IMG:latest"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMG:${GITHUB_SHA}")
          echo "image=$IMG"     >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
      - name: SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.push.outputs.digest }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '0'        # report-only to start; flip to '1' to gate
      - name: Cosign keyless sign
        run: cosign sign --yes "${{ steps.push.outputs.digest }}"

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT }}
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}
      - uses: azure/setup-helm@v4
      - name: Deploy
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}"
          helm upgrade --install reference-app chart/ \
            --namespace production --create-namespace \
            --set image.repository="$IMG" \
            --set image.tag="${GITHUB_SHA}" \
            --set serviceMonitor.enabled=false \
            --set replicaCount=1 \
            --wait --atomic --timeout 5m
