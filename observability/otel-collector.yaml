apiVersion: v1
kind: Namespace
metadata: { name: observability }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: observability
  annotations:
    # Bind to the Google SA created in terraform/observability.tf. Replace project-90390b2c-d762-4668-939.
    iam.gke.io/gcp-service-account: reference-platform-otel@project-90390b2c-d762-4668-939.iam.gserviceaccount.com
---
apiVersion: v1
kind: ConfigMap
metadata: { name: otel-collector-config, namespace: observability }
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
    processors:
      batch: { send_batch_size: 200, timeout: 5s }
      resourcedetection: { detectors: [gcp], timeout: 10s }   # tags spans with GKE context
    exporters:
      googlecloud: {}                                          # project auto-detected via Workload Identity
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [resourcedetection, batch]
          exporters: [googlecloud]
      telemetry:
        metrics: { address: 0.0.0.0:8888 }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: otel-collector, namespace: observability }
spec:
  replicas: 1
  selector: { matchLabels: { app: otel-collector } }
  template:
    metadata: { labels: { app: otel-collector } }
    spec:
      serviceAccountName: otel-collector
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:latest   # pin a version in real use
          args: ["--config=/conf/config.yaml"]
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: ["ALL"] } }
          resources: { requests: { cpu: 100m, memory: 128Mi }, limits: { cpu: 250m, memory: 256Mi } }
          volumeMounts: [{ name: conf, mountPath: /conf }]
      volumes:
        - name: conf
          configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata: { name: otel-collector, namespace: observability }
spec:
  selector: { app: otel-collector }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
